<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Sign in · RustClip</title>
  <link rel="stylesheet" href="/static/app.css?v=2" />
</head>
<body class="login-page">
  <main class="login-card">
    <header class="login-brand">
      <picture>
        <source srcset="/static/logo-light.png" media="(prefers-color-scheme: light)" />
        <img class="brand-mark" src="/static/logo.png" alt="" />
      </picture>
      <h1>RustClip</h1>
      <p class="muted">Admin console</p>
    </header>
    {% match error %}
    {% when Some with (msg) %}
      <p class="error-banner">{{ msg }}</p>
    {% when None %}
    {% endmatch %}
    <form method="post" action="/admin/login" class="login-form">
      {% include "_csrf.html" %}
      <label>
        <span>Username</span>
        <input type="text" name="username" required autofocus autocomplete="username" />
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" required autocomplete="current-password" />
      </label>
      <button type="submit" class="btn btn-primary">Sign in</button>
    </form>
  </main>
</body>
</html>
