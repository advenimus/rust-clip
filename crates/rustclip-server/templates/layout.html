<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>{% block title %}RustClip{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css?v=2" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/admin/">
      <picture>
        <source srcset="/static/logo-light.png" media="(prefers-color-scheme: light)" />
        <img class="brand-mark" src="/static/logo.png" alt="" />
      </picture>
      <span class="brand-name">RustClip</span>
    </a>
    <nav class="nav-links">
      <a href="/admin/">Overview</a>
      <a href="/admin/users">Users</a>
      <a href="/admin/devices">Devices</a>
      <a href="/admin/audit-log">Audit log</a>
      <a href="/admin/settings">Settings</a>
      <a href="/admin/about">About</a>
    </nav>
    <form method="post" action="/admin/logout" class="logout-form">
      <span class="who">{{ admin_display_name }}</span>
      <button type="submit" class="btn btn-ghost">Log out</button>
    </form>
  </header>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/admin.js" defer></script>
</body>
</html>
