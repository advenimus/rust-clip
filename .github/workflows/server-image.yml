name: Server Docker image

# Stable tags (v1.2.3) publish :1.2.3, :1.2, and :latest.
# Prerelease tags (v0.2.0-beta.1) publish :0.2.0-beta.1 and :beta only.
# Operators on `:latest` are never silently upgraded to a beta; beta
# testers opt in explicitly by flipping their compose image tag to
# `:beta` (or the specific `:0.2.0-beta.1`).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect Docker Hub secret
        id: dhcheck
        shell: bash
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.dhcheck.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/rustclip-server
            ${{ steps.dhcheck.outputs.publish == 'true' && format('docker.io/{0}/rustclip-server', secrets.DOCKERHUB_USERNAME) || '' }}
          # `enable=` expressions run in the workflow expression context.
          # `contains(github.ref_name, '-')` is true for SemVer prereleases
          # (v0.2.0-beta.1, v0.2.0-rc.2, ...) and false for stable (v0.2.0).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
            type=raw,value=beta,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
