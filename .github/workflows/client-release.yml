name: Client release

# Stable tags: v1.2.3 → release marked Latest, installers served to
# every user via the updater endpoint
# (https://github.com/advenimus/rust-clip/releases/latest/download/latest.json).
#
# Prerelease tags: anything with a hyphen in the SemVer, e.g.
# v0.2.0-beta.1 → release marked Pre-release. GitHub's
# /releases/latest endpoint automatically excludes prereleases, so
# stable users are never prompted to install these. Beta testers
# install manually from the release page.

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build:
    name: Build ${{ matrix.platform.label }}
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          # macos-13 (Intel) runners queue for 15+ min; the vast majority of
          # Macs in use today are Apple Silicon, so macos-aarch64 is the
          # target we ship. Intel Mac support can be added back later via
          # cross-compile if demand materialises.
          - label: macos-aarch64
            runner: macos-14
            rust-target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
          - label: linux-x86_64
            runner: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            tauri-args: ''
          - label: windows-x86_64
            runner: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: ''

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.platform.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.label }}

      - name: Install Linux clipboard + Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev

      - name: Build CLI binary
        shell: bash
        run: cargo build --release --locked --target ${{ matrix.platform.rust-target }} -p rustclip-client

      - name: Build + publish desktop app (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization. Variables are only set when the job
          # runs on macOS; on Linux/Windows runners they're empty and the
          # Tauri bundler skips the signing path.
          APPLE_CERTIFICATE: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
          # Tauri updater signing. Private key + password must be set as repo
          # secrets; without them tauri-action falls back to unsigned bundles
          # (which the updater plugin then refuses to apply). Keypair is
          # generated once with `cargo tauri signer generate` — see
          # docs/operator-guide.md for the one-time setup.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/rustclip-client-gui
          tagName: ${{ github.ref_name }}
          releaseName: ${{ contains(github.ref_name, '-') && format('RustClip {0} (Beta)', github.ref_name) || format('RustClip {0}', github.ref_name) }}
          releaseBody: |
            Desktop app for macOS, Windows, and Linux. CLI binary attached alongside.

            macOS builds are Developer ID signed and notarized by Apple — the app launches cleanly on Gatekeeper.
            Windows SmartScreen may still warn on first launch until we wire up code-signing on that side (More info → Run anyway).
          releaseDraft: false
          # Tags with a hyphen (v0.2.0-beta.1) land as GitHub Pre-releases;
          # stable users on the auto-updater never see them because the
          # /releases/latest endpoint skips prereleases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Only produce a signed `latest.json` when the signing secrets are
          # wired up. Before the Tauri keypair is set up (see operator-guide),
          # releases still ship as normal unsigned installers — they just
          # don't activate auto-update. First release after setup will pick up
          # in-app updates on subsequent releases.
          includeUpdaterJson: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
          args: ${{ matrix.platform.tauri-args }}

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p cli-dist
          cp "target/${{ matrix.platform.rust-target }}/release/rustclip-client" cli-dist/
          tar -C cli-dist -czf "rustclip-cli-${{ github.ref_name }}-${{ matrix.platform.label }}.tar.gz" rustclip-client

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path cli-dist | Out-Null
          Copy-Item "target/${{ matrix.platform.rust-target }}/release/rustclip-client.exe" cli-dist/
          Compress-Archive -Path "cli-dist/rustclip-client.exe" -DestinationPath "rustclip-cli-${{ github.ref_name }}-${{ matrix.platform.label }}.zip"

      - name: Attach CLI to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rustclip-cli-${{ github.ref_name }}-${{ matrix.platform.label }}.tar.gz
            rustclip-cli-${{ github.ref_name }}-${{ matrix.platform.label }}.zip
          tag_name: ${{ github.ref_name }}
          draft: false
          # Mirror the prerelease flag tauri-action set when it created
          # the release, so the CLI attach step doesn't accidentally
          # promote a Beta to Latest.
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
          fail_on_unmatched_files: false
