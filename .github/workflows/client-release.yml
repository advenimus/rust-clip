name: Client release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-13
            archive: rustclip-client-${{ github.ref_name }}-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: rustclip-client-${{ github.ref_name }}-macos-aarch64.tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: rustclip-client-${{ github.ref_name }}-linux-x86_64.tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: rustclip-client-${{ github.ref_name }}-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux clipboard deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Build client
        run: cargo build --release --locked --target ${{ matrix.target }} -p rustclip-client

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          staging=$(mktemp -d)
          cp "target/${{ matrix.target }}/release/rustclip-client" "$staging/"
          cp README.md "$staging/" 2>/dev/null || true
          tar -C "$staging" -czf "${{ matrix.archive }}" .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP "pkg")
          Copy-Item "target/${{ matrix.target }}/release/rustclip-client.exe" $staging
          if (Test-Path README.md) { Copy-Item README.md $staging }
          Compress-Archive -Path "$staging/*" -DestinationPath "${{ matrix.archive }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  publish:
    name: Attach to Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
          generate_release_notes: true
